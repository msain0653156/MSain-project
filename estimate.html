<!DOCTYPE html>
<html lang="en">
<head>
<title>Casita Sedona - Cost Estimator</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="styles/casita.css" rel="stylesheet">
<script src="scripts/estimate.js"></script>
</head>
<body>
<div id="wrapper">
    <header>
        <h1 id="title-link"><a href="index.html">Casita Sedona</a></h1>
    </header>

    <nav>
        <ul>
            <li><a href="rooms/rooms-comparison.html">Room Comparison</a></li>
            <li><a href="events/weekend.html">Weekend Events</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="estimate.html">Cost Estimator</a></li>
        </ul>
    </nav>

    <main id="estimate-page">
        <h2>Estimation of Costs</h2>
        <p>Use this page to estimate the cost of your stay at Casita Sedona.</p>

        <!-- lets user choose room -->
        <form id="estimate-form">
            <label for="room">Choose a room:</label>
            <select id="room">
                <option value="150">Javelina Room - $150 per night</option>
                <option value="200">Canyon Room - $200 per night</option>
                <option value="250">Premium Suite - $250 per night</option>
            </select>

            <label for="nights">Number of nights:</label>
            <input type="number" id="nights" min="1" value="1">

            <p><strong>Select add-on features:</strong></p>

            <!-- make checkboxes for specific things -->
            <label><input type="checkbox" id="breakfast"> Breakfast Package (+$20)</label><br>
            <label><input type="checkbox" id="parking"> Parking Pass (+$15)</label><br>
            <label><input type="checkbox" id="spa"> Spa Access (+$50)</label><br>
            <label><input type="checkbox" id="tour"> Guided Canyon Tour (+$40)</label>

            <br><br>
            <input type="button" value="Calculate Total" onclick="calculateTotal()">
        </form>

        <!-- where the total cost will be -->
        <p id="result"></p>
    </main>

    <footer>
        Copyright &copy; 2024 WebMaster
    </footer>
</div>
</body>
</html>
